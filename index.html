<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Abdullah | Personal Space</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(56, 189, 248, 0.15);
        }

        .profile-img-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 25px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #38bdf8;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            transition: transform 0.5s ease;
        }

        .profile-img:hover {
            transform: rotate(5px) scale(1.05);
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        .tagline {
            font-size: 15px;
            color: #38bdf8;
            font-weight: 400;
            margin-bottom: 20px;
            height: 22px;
        }

        .bio {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: #1e293b;
            color: #cbd5e1;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .social-btn:hover {
            background: #38bdf8;
            color: #0f172a;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
        }

        .footer-text {
            font-size: 12px;
            color: #64748b;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-img-container">
            <!-- Image name updated to 1782746269641.jpg -->
            <img src="1782746269641.jpg" alt="Muhammad Abdullah" class="profile-img">
        </div>

        <h1 id="greeting-name">Muhammad Abdullah</h1>
        
        <div class="tagline" id="dynamic-text"></div>

        <p class="bio">
            Welcome to my personal space on the internet! I am exploring technology, building clean layouts, and creating simple solutions for the web. Turning ideas into interactive realities.
        </p>

        <div class="social-links">
            <a href="https://www.facebook.com/abdullah.ad.266718" target="_blank" class="social-btn" title="Facebook">
                <svg viewBox="0 0 24 24">
                    <path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c4.56-.93 8-4.96 8-9.8z"/>
                </svg>
            </a>
            <a href="#" class="social-btn" title="Instagram">IG</a>
            <a href="#" class="social-btn" title="LinkedIn">LN</a>
            <a href="mailto:info@m-abdullah.online" class="social-btn" title="Email">✉</a>
        </div>

        <div class="footer-text">
            <p>&copy; 2026 m-abdullah.online | Created with ♥</p>
        </div>
    </div>

    <script>
        const hours = new Date().getHours();
        const greetingName = document.getElementById('greeting-name');
        
        if (hours < 12) {
            greetingName.innerHTML = "Good Morning! <br><span style='font-size: 22px; font-weight:400; color:#cbd5e1;'>I'm M. Abdullah</span>";
        } else if (hours < 18) {
            greetingName.innerHTML = "Good Afternoon! <br><span style='font-size: 22px; font-weight:400; color:#cbd5e1;'>I'm M. Abdullah</span>";
        } else {
            greetingName.innerHTML = "Good Evening! <br><span style='font-size: 22px; font-weight:400; color:#cbd5e1;'>I'm M. Abdullah</span>";
        }

        const textElement = document.getElementById('dynamic-text');
        const phrase = "Welcome to my personal space.";
        let index = 0;

        function typeEffect() {
            if (index < phrase.length) {
                textElement.innerHTML += phrase.charAt(index);
                index++;
                setTimeout(typeEffect, 100);
            }
        }

        window.onload = function() {
            typeEffect();
        };
    </script>
</body>
</html>
